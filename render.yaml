services:
  - type: web
    name: learnflow-api
    runtime: python
    buildCommand: cd backend && pip install --no-cache-dir --prefer-binary -r requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
