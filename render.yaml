services:
  - type: web
    name: learnflow-api
    runtime: python
    runtimeVersion: 3.11.7
    buildCommand: cd backend && pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
